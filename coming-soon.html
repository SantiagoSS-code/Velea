<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMINA — Something Beautiful is Coming</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ─────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0d0d;
      --bg2:    #161616;
      --bg3:    #1e1e1e;
      --border: rgba(255,255,255,0.1);
      --white:  #ffffff;
      --muted:  #888888;
      --teal:   #4fc3b8;
      --text:   #f0ece6;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Constellation canvas ───────────────── */
    #cs-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Nav ────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 68px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,13,13,0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 32px; height: 32px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon svg {
      width: 18px; height: 18px;
      stroke: var(--white);
      fill: none;
      stroke-width: 1.5;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); }
    .nav-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── Main layout ─────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    /* ── Eyebrow label ───────────────────────── */
    .cs-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease both 0.1s;
    }
    .cs-eyebrow::before,
    .cs-eyebrow::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--teal);
      opacity: 0.6;
    }

    /* ── Headline ────────────────────────────── */
    .cs-headline {
      font-size: clamp(42px, 7vw, 88px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 24px;
      animation: fadeUp 0.7s ease both 0.25s;
    }
    .cs-headline em {
      font-style: italic;
      font-weight: 300;
      color: var(--teal);
    }

    /* ── Sub ─────────────────────────────────── */
    .cs-sub {
      font-size: 16px;
      font-weight: 300;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 56px;
      animation: fadeUp 0.7s ease both 0.4s;
    }

    /* ── Email form ──────────────────────────── */
    .cs-form {
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 400px;
      margin-bottom: 48px;
      animation: fadeUp 0.7s ease both 0.55s;
    }

    .cs-form input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
      padding: 14px 18px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .cs-form input::placeholder { color: var(--muted); }
    .cs-form input:focus { border-color: rgba(79,195,184,0.5); }

    .cs-form button {
      background: var(--teal);
      color: #0d0d0d;
      border: none;
      border-radius: 0 8px 8px 0;
      padding: 14px 22px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }
    .cs-form button:hover { opacity: 0.88; transform: translateX(1px); }
    .cs-form button:active { transform: scale(0.98); }

    /* ── Divider / certifications ────────────── */
    .cs-cert {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fadeUp 0.7s ease both 0.65s;
    }
    .cs-cert span { margin: 0 10px; opacity: 0.4; }

    /* ── Floating orbs ───────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(79,195,184,0.12) 0%, transparent 70%);
      top: -120px; left: -160px;
      animation: orbDrift1 14s ease-in-out infinite;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(79,195,184,0.08) 0%, transparent 70%);
      bottom: -80px; right: -100px;
      animation: orbDrift2 18s ease-in-out infinite;
    }

    /* ── Thin horizontal rule ────────────────── */
    .cs-rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      margin: 0 auto 40px;
      animation: fadeUp 0.6s ease both 0.2s;
    }

    /* ── Animations ──────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes orbDrift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(40px, 30px) scale(1.08); }
    }
    @keyframes orbDrift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(-30px, -20px) scale(1.05); }
    }

    /* ── Success state ───────────────────────── */
    .cs-success {
      display: none;
      font-size: 13px;
      color: var(--teal);
      letter-spacing: 0.06em;
      margin-top: -36px;
      margin-bottom: 48px;
      animation: fadeUp 0.4s ease both;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .cs-form { flex-direction: column; gap: 10px; }
      .cs-form input { border-right: 1px solid var(--border); border-radius: 8px; }
      .cs-form button { border-radius: 8px; }
    }
  </style>
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Constellation canvas (reuses main.js logic) -->
  <canvas id="cs-canvas"></canvas>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.5">
          <path d="M12 3c3.5 0 6.5 3 6.5 6.5 0 2-1 4-3 5.5L12 21l-3.5-6C6.5 13.5 5.5 11.5 5.5 9.5 5.5 6 8.5 3 12 3z"/>
          <circle cx="12" cy="9" r="2"/>
        </svg>
      </div>
      LUMINA
    </a>

    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      Back to Home
    </a>
  </nav>

  <!-- Main content -->
  <main>
    <div class="cs-eyebrow">The Collection</div>

    <h1 class="cs-headline">
      Something<br><em>beautiful</em><br>is coming.
    </h1>

    <p class="cs-sub">
      We're crafting something extraordinary. Be the first to experience
      the next chapter of LUMINA.
    </p>

    <form class="cs-form" onsubmit="handleSubmit(event)">
      <input type="email" placeholder="Enter your email for early access" required />
      <button type="submit">Notify Me</button>
    </form>

    <p class="cs-success" id="cs-success">
      ✓ &nbsp;You're on the list. We'll be in touch.
    </p>

    <p class="cs-cert">
      Cruelty-Free <span>—</span> Vegan <span>—</span> Dermatologist Tested
    </p>
  </main>

  <script>
    // ── Notify Me form ─────────────────────────────────
    function handleSubmit(e) {
      e.preventDefault();
      const form    = e.target;
      const success = document.getElementById('cs-success');
      form.style.display    = 'none';
      success.style.display = 'block';
    }

    // ── Constellation background ────────────────────────
    (function () {
      const canvas = document.getElementById('cs-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, stars = [];

      const COUNT  = 90;
      const DIST   = 140;
      const SPEED  = 0.18;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function initStars() {
        stars = Array.from({ length: COUNT }, () => ({
          x:  Math.random() * W,
          y:  Math.random() * H,
          vx: (Math.random() - 0.5) * SPEED,
          vy: (Math.random() - 0.5) * SPEED,
          r:  Math.random() * 1.4 + 0.4,
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // move
        stars.forEach(s => {
          s.x += s.vx;
          s.y += s.vy;
          if (s.x < 0) s.x = W;
          if (s.x > W) s.x = 0;
          if (s.y < 0) s.y = H;
          if (s.y > H) s.y = 0;
        });

        // lines
        for (let i = 0; i < stars.length; i++) {
          for (let j = i + 1; j < stars.length; j++) {
            const dx   = stars[i].x - stars[j].x;
            const dy   = stars[i].y - stars[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < DIST) {
              ctx.beginPath();
              ctx.moveTo(stars[i].x, stars[i].y);
              ctx.lineTo(stars[j].x, stars[j].y);
              ctx.strokeStyle = `rgba(79,195,184,${0.12 * (1 - dist / DIST)})`;
              ctx.lineWidth   = 0.6;
              ctx.stroke();
            }
          }
        }

        // dots
        stars.forEach(s => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.35)';
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); initStars(); });
      resize();
      initStars();
      draw();
    })();
  </script>

</body>
</html>
